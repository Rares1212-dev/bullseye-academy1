<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIRALBOOST // RECOVERED</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: #000; color: #fff; 
      font-family: 'Inter', sans-serif; 
      overflow-x: hidden; 
    }

    /* ── CLEAN ANIMATIONS ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    section {
      min-height: 100vh; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 5%; text-align: center;
      position: relative;
    }

    /* ── TYPOGRAPHY ── */
    .hero-title {
      font-size: clamp(3rem, 15vw, 10rem);
      line-height: 0.8; letter-spacing: -0.07em;
      text-transform: uppercase;
      animation: fadeInUp 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards;
    }

    .sub-text {
      font-family: 'Space Mono', monospace;
      color: #555; font-size: 0.8rem;
      margin-top: 40px; letter-spacing: 4px;
      opacity: 0; animation: fadeInUp 1.5s 0.5s forwards;
    }

    /* ── APPLE STYLE GRID ── */
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1px; background: #222; width: 100%; max-width: 1200px;
      margin-top: 80px; border: 1px solid #222;
      opacity: 0; animation: fadeInUp 1.5s 0.8s forwards;
    }

    .card {
      background: #000; padding: 60px; text-align: left;
    }

    /* ── FORM ── */
    .input-field {
      width: 100%; max-width: 500px;
      background: transparent; border: none;
      border-bottom: 1px solid #333; color: #fff;
      padding: 20px; font-size: 1.5rem; text-align: center;
      outline: none; transition: 0.3s;
    }
    .input-field:focus { border-color: #fff; }

    .btn {
      margin-top: 30px; background: #fff; color: #000;
      padding: 20px 60px; font-weight: 900; border: none;
      cursor: pointer; text-transform: uppercase;
    }

    .bg-glow {
      position: absolute; top: 50%; left: 50%;
      width: 60vw; height: 60vw; background: radial-gradient(circle, #111 0%, transparent 70%);
      transform: translate(-50%, -50%); z-index: -1;
    }
  </style>
</head>
<body>

  <!-- PAGE 1: IMPACT -->
  <section>
    <div class="bg-glow"></div>
    <h1 class="hero-title">200.VIEWS.<br>IS.A.CHOICE.</h1>

          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email: email })
      });

      if(res.ok) {
        status.innerText = "SUCCESS_INITIATED";
        btn.style.display = "none";
      }
    } catch (e) {
      status.innerText = "CONNECTION_ERROR";
    }
  }
</script>
</body>
</html>
