<!DOCTYPE html>
<html lang="ro">
<head>
    <!-- 
        SYSTEM_INITIALIZATION: VIRALBOOST_V3
        STATUS: ALPHA_ACCESS
        ENCRYPTION: AES-256-GCM
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRALBOOST // THE SYSTEM</title>
    
    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap" rel="stylesheet">

    <style>
        /* ── CORE DESIGN SYSTEM ── */
        :root {
            --purp: #8a2be2;
            --purp-glow: rgba(138, 43, 226, 0.4);
            --bg: #000000;
            --text: #ffffff;
            --circuit-color: rgba(138, 43, 226, 0.08);
            --transition-speed: 1.2s;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* ── RESET & SCROLL SNAPPING ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body, html {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            height: 100%;
        }

        /* ── BACKGROUND LAYERS ── */
        .circuit-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--circuit-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--circuit-color) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -2;
            pointer-events: none;
        }

        .dynamic-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--purp-glow) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        /* ── SECTION ARCHITECTURE ── */
        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .container {
            width: 100%;
            max-width: 1400px;
            padding: 0 40px;
            z-index: 5;
        }

        /* ── TYPOGRAPHY ── */
        .hero-title {
            font-size: clamp(5rem, 18vw, 15rem);
            font-weight: 900;
            line-height: 0.8;
            text-transform: uppercase;
            letter-spacing: -0.06em;
            text-align: center;
            margin: 0;
            opacity: 0;
            transform: translateY(100px) skewY(5deg);
            transition: all var(--transition-speed) var(--ease);
        }

        .outline-text {
            -webkit-text-stroke: 2px var(--purp);
            color: transparent;
            text-shadow: 0 0 30px var(--purp-glow);
        }

        .reveal .hero-title {
            opacity: 1;
            transform: translateY(0) skewY(0deg);
        }

        .sub-meta {
            font-family: 'Space Mono', monospace;
            color: var(--purp);
            text-transform: uppercase;
            letter-spacing: 0.6em;
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            margin-top: 30px;
            text-align: center;
            opacity: 0;
            transition: opacity 1s var(--ease) 0.5s;
        }

        .reveal .sub-meta {
            opacity: 1;
        }

        /* ── PAGE 2 SPECIFIC: THE PRICE ── */
        .price-hero {
            font-size: clamp(8rem, 20vw, 22rem);
            color: var(--purp);
            text-shadow: 0 0 100px var(--purp);
            font-weight: 900;
            margin: 20px 0;
            transition: transform 0.5s var(--ease);
        }

        .price-hero:hover {
            transform: scale(1.05);
        }

        /* ── PAGE 3 SPECIFIC: ACCESS ── */
        .access-interface {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 50px;
        }

        .terminal-input {
            width: 100%;
            background: rgba(138, 43, 226, 0.05);
            border: 2px solid var(--purp);
            padding: 30px;
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            outline: none;
            box-shadow: 0 0 20px var(--purp-glow);
            transition: all 0.3s ease;
        }

        .terminal-input:focus {
            background: rgba(138, 43, 226, 0.1);
            box-shadow: 0 0 50px var(--purp-glow);
            border-color: #fff;
        }

        .execute-button {
            width: 100%;
            padding: 30px;
            background: #ffffff;
            color: #000000;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 1.1rem;
            transition: all 0.4s var(--ease);
            position: relative;
            overflow: hidden;
        }

        .execute-button:hover {
            background: var(--purp);
            color: #fff;
            box-shadow: 0 0 60px var(--purp);
            letter-spacing: 12px;
        }

        /* ── DECORATIVE TERMINAL ELEMENTS ── */
        .system-status {
            position: fixed;
            bottom: 40px;
            left: 40px;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: #333;
            z-index: 100;
            pointer-events: none;
        }

        .corner-bracket {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 1px solid var(--purp);
            opacity: 0.2;
            pointer-events: none;
        }

        .top-left { top: 60px; left: 60px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 60px; right: 60px; border-left: 0; border-top: 0; }

        /* ── CUSTOM SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--purp); }

        @keyframes pulse {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            font-family: 'Space Mono';
            font-size: 0.7rem;
            letter-spacing: 3px;
            animation: pulse 2s infinite;
        }

    </style>
</head>
<body>

    <!-- SYSTEM ASSETS -->
    <div class="circuit-bg"></div>
    <div class="dynamic-glow" id="glow"></div>
    
    <div class="system-status">
        SYS_OS: VIRALBOOST_3.0<br>
        LOC: GLOBAL_CDN<br>
        LATENCY: 14ms<br>
        MARKET_DOMINATION: ACTIVE
    </div>

    <!-- SECTION 1: THE REVELATION -->
    <section id="sec-1">
        <div class="corner-bracket top-left"></div>
        <div class="corner-bracket bottom-right"></div>
        
        <div class="container">
            <h1 class="hero-title">WAKE<br><span class="outline-text">UP.</span></h1>
            <p class="sub-meta">The algorithm is yours to control.</p>
        </div>

        <div class="scroll-indicator">INITIATE_SCROLL</div>
    </section>

    <!-- SECTION 2: THE PRICE -->
    <section id="sec-2">
        <div class="container" style="text-align: center;">
            <p class="sub-meta" style="margin-bottom: 20px;">MARKET_VALUE_ESTIMATE</p>
            <h1 class="hero-title" style="font-size: 6vw;">SYSTEM_ACCESS</h1>
            <div class="price-hero">$0/FREE</div>
            <p class="sub-meta" style="color: #444;">*BETA_PHASE_ONLY_STRICT_LIMIT</p>
        </div>
    </section>

    <!-- SECTION 3: THE GATEWAY -->
    <section id="sec-3">
        <div class="container" style="display: flex; flex-direction: column; align-items: center;">
            <h1 class="hero-title">ASCEND.</h1>
            <p class="sub-meta">Identity verification required</p>

            <div class="access-interface">
                <input type="email" id="user_email" class="terminal-input" placeholder="ENTER_IDENTITY_EMAIL">
                <button class="execute-button" id="execute_btn">EXECUTE_SYSTEM</button>
            </div>
            
            <p id="system_msg" style="margin-top: 30px; font-family: 'Space Mono'; font-size: 0.8rem; color: #444;"></p>
        </div>
    </section>

    <!-- SYSTEM LOGIC -->
    <script>
        // MOUSE TRACKING ENGINE
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Smoothed movement using requestAnimationFrame for high performance
            window.requestAnimationFrame(() => {
                glow.style.left = `${x}px`;
                glow.style.top = `${y}px`;
            });
        });

        // SCROLL OBSERVER (Triggers animations per section)
        const observerOptions = {
            threshold: 0.5
        };

        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                    console.log(`>> SECTOR_LOADED: ${entry.target.id}`);
                }
            });
        }, observerOptions);

        document.querySelectorAll('section').forEach(section => {
            sectionObserver.observe(section);
        });

        // SUPABASE SUBMISSION LOGIC
        const btn = document.getElementById('execute_btn');
        const emailInput = document.getElementById('user_email');
        const msg = document.getElementById('system_msg');

        const SUPABASE_URL = 'https://uutxxjvwlnjviwqzazmy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1dHh4anZ3bG5qdml3cXphem15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDU1NDUsImV4cCI6MjA5MTkyMTU0NX0.7bM2pQaO1ZCItvTIVyzKOHnZlUXrvdsK6Gpo96anaXc';

        btn.addEventListener('click', async () => {
            const email = emailInput.value;

            if (!email.includes('@')) {
                msg.innerHTML = ">> [!] ERROR: INVALID_IDENTITY_FORMAT";
                msg.style.color = "#ff3b30";
                return;
            }

            msg.innerHTML = ">> INITIALIZING_ENCRYPTION...";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ email: email })
                });

                if (response.ok) {
                    msg.innerHTML = ">> [OK] NEURAL_LINK_ESTABLISHED. CHECK_INBOX.";
                    msg.style.color = "#8a2be2";
                    btn.innerText = "SYNCED";
                } else {
                    throw new Error();
                }
            } catch (err) {
                msg.innerHTML = ">> [!] CRITICAL_FAILURE: UPLINK_LOST";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        });

        // Log final system ready
        console.log("VIRALBOOST_ENGINE_ONLINE");
    </script>
</body>
</html>
